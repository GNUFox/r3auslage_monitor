[BASIC]
media_show_time = 2
mpv_options = "--loop --ao=null"
random = no
verbosity_level = 0

[media webpages]
path = ./webpages
show_in_a_row = 1
run_script = ./webpages/update.sh

[media photos]
path = ./photos/
show_in_a_row = 1

[media mastodon]
path = ./mastodon_bilder/
show_in_a_row = 3

[media videos]
path = ./videos
show_in_a_row = 1
